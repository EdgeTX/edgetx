name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'docs-requirements.txt'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # release tags only, not -rc
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'docs-requirements.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -r docs-requirements.txt

      - name: Configure git for mike
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build docs (PR check)
        if: github.event_name == 'pull_request'
        run: mkdocs build --strict

      - name: Deploy as latest (main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: mike deploy --push --update-aliases latest

      - name: Deploy release version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          # Extract minor version from tag, e.g. v2.11.2 -> v2.11
          VERSION=$(echo "${GITHUB_REF_NAME}" | sed 's/\.[0-9]*$//')
          mike deploy --push --update-aliases "${VERSION}" stable
